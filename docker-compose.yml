version: "3.9"

# ---------------------------------------------------------------------------
# Vexil — full-stack Docker Compose
#
# Startup order (enforced by healthcheck dependencies):
#   postgres ──► api ──► web
#   redis    ──►  │
#
# The api service runs run_start.sh on boot which:
#   1. Waits for postgres/redis (handled here via depends_on + healthcheck)
#   2. Runs all pending migrations (idempotent)
#   3. Starts the Fastify server
#
# Quick start:
#   cp .env.example .env          # set JWT_SECRET (required)
#   docker compose up --build     # first run builds images
#   docker compose up             # subsequent runs (cached images)
#
# Ports exposed to host:
#   5432  PostgreSQL
#   6379  Redis
#   3000  Vexil API  — Swagger: http://localhost:3000/docs
#   5173  Vexil Web  — Dashboard: http://localhost:5173
# ---------------------------------------------------------------------------

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB:       ${DB_NAME:-vexil}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vexil}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # appendonly yes persists data across restarts
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── API ────────────────────────────────────────────────────────────────────
  # Builds from apps/api/Dockerfile (monorepo context = repo root).
  # run_start.sh runs migrations before the server starts — no manual step needed.
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV:   production
      PORT:       3000

      # Database — use internal Docker network hostname "postgres"
      DB_HOST:    postgres
      DB_PORT:    5432
      DB_USER:    ${DB_USER:-postgres}
      DB_PASS:    ${DB_PASS:-postgres}
      DB_NAME:    ${DB_NAME:-vexil}

      # Redis — use internal Docker network hostname "redis"
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # Auth — REQUIRED. Compose will fail to start if this is not set.
      JWT_SECRET: ${JWT_SECRET:?Please set JWT_SECRET in .env (run: openssl rand -hex 32)}

      # CORS — allow the web container (browser calls come from localhost:5173)
      WEB_URL:    ${WEB_URL:-http://localhost:5173}

      # Rate-limit tuning (optional — defaults are production-appropriate)
      MAX_EVAL_PER_DAY:     ${MAX_EVAL_PER_DAY:-5000}
      EVAL_BUCKET_CAPACITY: ${EVAL_BUCKET_CAPACITY:-20}
      EVAL_REFILL_RATE_MS:  ${EVAL_REFILL_RATE_MS:-500}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # node is always available in the image; no curl/wget dependency
      test:
        - "CMD-SHELL"
        - >
          node -e "
          require('http').get('http://localhost:3000/health', function(r) {
            process.exit(r.statusCode === 200 ? 0 : 1);
          }).on('error', function() { process.exit(1); });
          "
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── Web (React dashboard) ──────────────────────────────────────────────────
  # VITE_API_URL is baked into the JS bundle at build time.
  # From the browser's perspective the API is on localhost:3000 (port forwarded).
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Browsers call the API directly — use the host-facing address
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
